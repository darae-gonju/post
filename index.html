<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트스토어 ➔ 우체국 TXT 변환기</title>
    <style>
        :root { --primary-color: #e61919; --bg-color: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; text-align: center; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        .input-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .footer-info { margin-top: 1.5rem; font-size: 0.8rem; color: #999; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>📮 우체국 TXT 변환</h2>
    <p>네이버 주문서를 우체국 양식으로 변환합니다.</p>

    <div class="input-group">
        <label>1. 네이버 엑셀 파일 업로드</label>
        <input type="file" id="fileInput" accept=".xlsx">
    </div>

    <div class="input-group">
        <label>2. 품목 카테고리 선택</label>
        <select id="itemTypeSelect">
            <option value="농/수/축산물(일반)">농/수/축산물(일반)</option>
            <option value="농/수/축산물(냉동,냉장)">농/수/축산물(냉동,냉장)</option>
            <option value="전자제품">전자제품</option>
            <option value="서적">서적</option>
            <option value="의류/패션잡화">의류/패션잡화</option>
            <option value="미용/화장품">미용/화장품</option>
            <option value="의료/건강식품">의료/건강식품</option>
            <option value="생활용품">생활용품</option>
        </select>
    </div>

    <div class="input-group">
        <label>3. 비밀번호 입력 (숫자)</label>
        <input type="password" id="pwInput" placeholder="휴대폰 번호 등 숫자 비밀번호">
    </div>

    <button class="btn" onclick="uploadFile()" id="submitBtn">변환 및 TXT 다운로드</button>
    <div id="loading" style="display:none; margin-top:10px; color:#e61919;">처리 중...</div>

    <div class="footer-info">
        업로드 형식: <strong>텍스트(파이프로 분리)(*.txt)</strong><br>
        5열: 일반전화(010 제외) / 6열: 휴대폰(010, 050)
    </div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const pwInput = document.getElementById('pwInput');
        const itemTypeSelect = document.getElementById('itemTypeSelect');
        const submitBtn = document.getElementById('submitBtn');

        if(!fileInput.files[0]) return alert("파일을 선택해주세요!");
        if(!pwInput.value) return alert("비밀번호를 입력해주세요!");

        submitBtn.disabled = true;
        document.getElementById('loading').style.display = "block";

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('password', pwInput.value);
        formData.append('itemType', itemTypeSelect.value);

        try {
            const res = await fetch('/api', { method: 'POST', body: formData });
            if(res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `우체국_업로드_${new Date().getTime()}.txt`;
                a.click();
            } else {
                const err = await res.json();
                alert("오류: " + err.error);
            }
        } catch (e) {
            alert("서버 연결 실패");
        } finally {
            submitBtn.disabled = false;
            document.getElementById('loading').style.display = "none";
        }
    }
</script>
</body>
</html>
