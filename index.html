<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트스토어 ➔ 우체국 엑셀 변환기</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
        
        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #555;
        }
        input[type="file"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        .footer-info {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
            line-height: 1.5;
        }
        .loading { display: none; margin-top: 10px; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📮 우체국 엑셀 변환</h2>
    <p>스마트스토어 주문서를<br>우체국 양식으로 1초 만에 변환하세요.</p>

    <div class="input-group">
        <label>1. 네이버 엑셀 파일 업로드</label>
        <input type="file" id="fileInput" accept=".xlsx">
    </div>

    <div class="input-group">
        <label>2. 비밀번호 입력 (숫자)</label>
        <input type="password" id="pwInput" placeholder="휴대폰 번호 등 숫자 비밀번호" onkeydown="if(event.keyCode==13) uploadFile()">
    </div>

    <button class="btn" onclick="uploadFile()" id="submitBtn">변환 및 다운로드</button>
    <div id="loading" class="loading">변환 중입니다...</div>

    <div class="footer-info">
        보안 안내: 업로드된 파일은 서버에 저장되지 않으며<br>변환 즉시 메모리에서 삭제됩니다.<br>
        <strong>* 숫자 비밀번호 환경에 최적화되어 있습니다.</strong>
    </div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const pwInput = document.getElementById('pwInput');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');

        const file = fileInput.files[0];
        const pw = pwInput.value;

        if(!file) return alert("네이버에서 받은 엑셀 파일을 선택해주세요!");
        if(!pw) return alert("비밀번호를 입력해주세요!");

        // 상태 표시
        submitBtn.disabled = true;
        submitBtn.innerText = "처리 중...";
        loading.style.display = "block";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('password', pw);

        try {
            const res = await fetch('/api', { 
                method: 'POST', 
                body: formData 
            });

            if(res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // 오늘 날짜로 파일명 생성
                const today = new Date().toISOString().slice(5, 10).replace('-', '');
                a.download = `우체국_변환_${today}.xlsx`;
                
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } else {
                const errorData = await res.json();
                alert("오류: " + (errorData.error || "비밀번호를 확인해주세요."));
            }
        } catch (err) {
            alert("서버 연결에 실패했습니다.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "변환 및 다운로드";
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
